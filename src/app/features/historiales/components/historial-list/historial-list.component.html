<section class="historial-list">
  <div class="historial-list__header">
    <div>
      <p class="historial-list__eyebrow">Registro</p>
      <h2 class="historial-list__title">Historial de Libros</h2>
      <p class="historial-list__subtitle">
        Consulta los movimientos recientes de la biblioteca.
      </p>
      <input
        type="text"
        class="historial-list__search"
        [formControl]="searchHistorial"
        placeholder="Buscar por acción (ej: Préstamo)..."
      />
    </div>

    <button type="button" class="historial-list__create-button" (click)="onCreateNew()">
      + Nueva Entrada
    </button>
  </div>

  <div class="historial-list__toolbar">
    <p class="historial-list__results">
      Mostrando {{ showingFrom }}-{{ showingTo }} de {{ totalItems }} registros
    </p>
  </div>

  <div class="historial-list__body">
    <div *ngIf="isLoading" class="historial-list__state">Cargando registros...</div>

    <div *ngIf="!isLoading && historiales.length === 0" class="historial-list__state">
      No se han encontrado registros en el historial.
    </div>

    <div *ngIf="!isLoading && historiales.length > 0" class="historial-list__items">
      <article
        *ngFor="let h of historiales; trackBy: trackByHistorialId"
        class="historial-list__card"
        [class.active]="isSelected(h)"
        (click)="onSelect(h)"
      >
        <div class="historial-list__card-top">
          <h3 class="historial-list__card-title">
            {{ h.accion || 'Sin acción' }}
          </h3>
          <div class="historial-list__card-actions">
            <button
              type="button"
              class="historial-list__delete-btn"
              (click)="onDeletePermanent(h._id!, $event)"
              title="Borrar registro"
            >
              Borrar
            </button>
          </div>
        </div>

        <div class="historial-list__fields">
          <div class="historial-list__field" *ngFor="let field of getVisibleFields(h)">
            <span class="historial-list__field-label">{{ field.label }}</span>
            <span class="historial-list__field-value">{{ field.value }}</span>
          </div>
        </div>
      </article>
    </div>
  </div>

  <div class="historial-list__pagination" *ngIf="!isLoading && totalItems > 0 && totalPages > 1">
    <button
      type="button"
      class="historial-list__page-button"
      (click)="onPreviousPage()"
      [disabled]="currentPage === 1"
    >
      Anterior
    </button>

    <div class="historial-list__page-numbers">
      <button
        type="button"
        class="historial-list__page-number"
        *ngFor="let page of pages"
        [class.active]="page === currentPage"
        (click)="onGoToPage(page)"
      >
        {{ page }}
      </button>
    </div>

    <button
      type="button"
      class="historial-list__page-button"
      (click)="onNextPage()"
      [disabled]="currentPage === totalPages"
    >
      Siguiente
    </button>
  </div>
</section>
