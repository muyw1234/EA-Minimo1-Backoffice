<section class="autor-form">
  <div class="autor-form__header">
    <div>
      <p class="autor-form__eyebrow">Formulario</p>
      <h2 class="autor-form__title">{{ formTitle }}</h2>
      <p class="autor-form__subtitle">
        {{ formSubtitle }}
      </p>
    </div>
  </div>

  <div
    class="autor-form__alert autor-form__alert--error"
    *ngIf="errorMessage"
  >
    {{ errorMessage }}
  </div>

  <div
    class="autor-form__alert autor-form__alert--success"
    *ngIf="successMessage"
  >
    {{ successMessage }}
  </div>

  <form class="autor-form__body" [formGroup]="form" (ngSubmit)="onSubmit()">
    <input type="hidden" formControlName="_id" />
    <input type="hidden" formControlName="IsDeleted" />

    <div class="autor-form__grid">
      <div class="autor-form__field autor-form__field--full">
        <label class="autor-form__label" for="fullName">Nombre completo</label>
        <input
          id="fullName"
          type="text"
          class="autor-form__input"
          formControlName="fullName"
          placeholder="Introduce el nombre completo del autor"
        />
        <p
          class="autor-form__error"
          *ngIf="fullNameControl.touched && fullNameControl.invalid"
        >
          El nombre completo es obligatorio.
        </p>
      </div>
    </div>

    <div class="autor-form__actions">
      <button
        type="button"
        class="autor-form__button autor-form__button--secondary"
        (click)="onCancel()"
        [disabled]="isSaving || isDeleting"
      >
        Cancelar
      </button>

      <button
        type="submit"
        class="autor-form__button autor-form__button--primary"
        [disabled]="isSaving || isDeleting"
      >
        {{ isSaving ? 'Guardando...' : (isCreating ? 'Crear autor' : 'Guardar cambios') }}
      </button>

      <button
        *ngIf="!isCreating && autor?._id"
        type="button"
        class="autor-form__button autor-form__button--danger"
        (click)="onDelete()"
        [disabled]="isSaving || isDeleting"
      >
        {{ isDeleting ? 'Eliminando...' : 'Marcar como eliminado' }}
      </button>
    </div>
  </form>
</section>
